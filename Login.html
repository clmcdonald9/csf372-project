    <form id="loginForm"> <!-- "Functionality" for the login (no database interaction, just checks for invalid chars). -->

            Username:
            <input type="text" id="username" name="username">
        </label>
        <br><br>
        <label>
            Password:
            <input type="password" id="password" name="password">
        </label>
        <br><br>
        <button type="submit">Submit</button>
		<br><br>
        <p id="errorMessage" class="error" style="display:none;">Username can only contain characters A-Z or a-z!</p>
    </form>
</div>
