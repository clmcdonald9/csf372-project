<!DOCTYPE html>
<html>
<head>
	<meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- This is not really part of the instructions but it just makes things look nicer. -->
    <title>UAF Films - Gallery</title>
    <style>
        body { 
			font-family: Arial, sans-serif; 
			margin: 0;
			display: flex;
			flex-direction: column;
			min-height: 100vh; 
		}
		
        header, footer { 
			background-color: #12279c; 
			color: yellow; 
			padding: 15px; 
		}

        header img { height: 50px;
			vertical-align: middle; 
		}

        nav a {
            color: white;
            margin: 0 15px;
            font-weight: bold;
        }
        .add_button {
            display: block;
            margin-left: auto;
        }
		.gallery_grid {
            display: grid;
            grid-template-columns: repeat(5, minmax(0, 1fr));
            gap: 20px;
            margin: 20px auto;
        }

        @media (max-width: 1080px) {
            .gallery_grid {
            grid-template-columns: repeat(auto-fill, minmax(min(180px, 100%), 1fr));
            }
        }
        .gallery_item {
            padding: 5px;
            text-align: center;
            width: 100%;
            border-radius: 10px;
            background-color:#dadffc;
            display: grid;
            grid-template-rows: auto 1fr;
        }
        .thumbnail {
            width: 100%;
            object-fit: cover;
            padding: 2px;
            background-color: #383a41;
            border-radius: 8px 8px 0 0;
        }
        .movie_details {
            display: flex;
            flex-direction: row;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
        }
        .movie_title {
            text-align: center;
            max-width: 100%;
            margin: 4px auto;
            word-wrap: break-word;
        }
        .rating {
            white-space: nowrap;
        }
        .content { 
			padding: 40px; 
			text-align: center; 
			flex: 1;
		}
        p { 
			font-size: 12pt; 
			text-align: justify; 
			max-width: 800px; 
			margin: auto; 
		}
        footer { 
            text-align: center; 
        }
    </style>
</head>
<body>

<header>
    <img src="logo.png" title="UAF Logo">
    <span style="font-size: 28px; font-weight: bold;"> UAF Films</span>
    <nav style="float: right;">
        <a href="Login.html">Login</a>
        <a href="Gallery.html">Gallery</a>
    </nav>
</header>



<div class="content">

    <h2>Gallery</h2>
    <button id="add_button" class="add_button"> <a href="AddMovie.html">Add a Movie</a> </button>


	<div id="div_gallery_grid" class="gallery_grid"></div>
	
</div>

<footer>
    Contact: qtherrell@alaska.edu | +1-800-MOVIES!!!!  
    <br>
    &copy; UAFFILMS
</footer>

<script src="Gallery.js"></script>

</body>
</html>
