<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UAF Films Video Player</title>
    <style>
        body { 
			font-family: Arial, sans-serif; 
			margin: 0;
			display: flex;
			flex-direction: column;
			min-height: 100vh; 
		}

        header, footer {
            background-color: #12279c;
            color: yellow;
            padding: 15px;
        }

        header img {
            height: 50px;
            vertical-align: middle;
        }

        nav a {
            color: white;
            margin: 0 15px;
            font-weight: bold;
        }

        .content { 
			padding: 40px; 
			text-align: center; 
			flex: 1;
		}

        .controls {
            margin-top: 15px;
            margin-bottom: 30px;
        }

        button {
            padding: 10px 20px;
            margin: 5px;
            cursor: pointer;
            font-weight: bold;
        }
        .video-player {
            width: 100%;
            height: auto;
            aspect-ratio: 16 / 9;
            border: none;
        }

        .movie-information {
            text-align: left;
            margin-top: 20px;
            padding: 20px;
            background-color: #f4f4f4;
            border-radius: 8px;
        }

        .manager-controls {
            border: 2px solid #cc0000;
            padding: 15px;
            margin-top: 20px;
            text-align: left;
            background-color: #ffe6e6;
            display: none;
        }

        .comments {
            border: 2px solid #009933;
            padding: 15px;
            margin-top: 20px;
            text-align: left;
            background-color: #e6ffe6;
            display: none;
        }

        footer {
            text-align: center;
        }
    </style>
</head>
<body>
    <header>
        <img src="logo.png" title="UAF logo" />
        <span style="font-size: 28px; font-weight: bold;">UAF Films</span>
        <nav style="float: right;">
            <a href="Home.html">Home</a>
            <a href="Login.html">Login</a>
            <a href="Gallery.html">Gallery</a>
        </nav>
    </header>
    <div class="content">
        <h2 id="heading_movie_title">Loading Movie...</h2>

        <iframe 
        id="iframe_video_player" 
        frameborder="0"
        allowfullscreen
        class ="video-player">        
        </iframe>

        <div class="controls">
            <button id="button_like">Like (<span id="span_like_count">0</span>)</button>
            <button id="button_dislike">Dislike (<span id="span_dislike_count">0</span>)</button>
        </div>

        <div class="movie-information">
            <h3>About this film:</h3>
            <p id="paragraph_movie_description">Loading description...</p>
        </div>

        <div id="id_manager_controls" class="manager-controls">
            <h3>Manager Comments</h3>
            <div id="div_comments"></div>
            <div id="div_add_comment" style="display: none; margin-top: 15px;">
                <input type="text" id="text_new_comment" placeholder="Write Comment for content editor here" style="width: 70%; padding: 8px;">
                <button id="button_submit_comment">Add comment</button>
            </div>
        </div>
    </div>

    <footer>
        Contact: qtherrell@alaska.edu | +1-800-MOVIES!!!!
        <br>
        &copy; UAFFILMS
    </footer>

    <script src="VideoPlayer.js"></script>
</body>
</html>
