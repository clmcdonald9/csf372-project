<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- This is not really part of the instructions but it just makes things look nicer. -->
    <title>UAF Films - Login</title>
    <style>
        body { 
			font-family: Arial, sans-serif; 
			margin: 0;
			display: flex;
			flex-direction: column;
			min-height: 100vh; 
		}
		
        header, footer { 
			background-color: #12279c; 
			color: yellow; 
			padding: 15px; 
		}

        header img { height: 50px;
			vertical-align: middle; 
		}

        nav a {
            color: white;
            margin: 0 15px;
            font-weight: bold;
       	}

        .content { 
			padding: 40px; 
			text-align: center; 
			flex: 1;
		}

        p { 
			font-size: 12pt; 
			text-align: justify; 
			max-width: 800px; 
			margin: auto; 
		}

        footer { 
			text-align: center; 
		}

		 .thumbnail { /* This is a test to try and get all of my images to be a more regular size. */
        width: 200px;
        height: 200px;
        object-fit: cover;
    	}
    </style>
</head>
<body>

<header>
    <img src="../logo.png" title="UAF Logo"> <!-- This will fail because I did not upload the pictures it references to the github. -->
    <span style="font-size: 28px; font-weight: bold;"> UAF Films</span>

</header>

<div class="content">
    <h2>Login</h2>

    <form id="form_login"> 
        <label>
            Username:
            <input type="text" id="text_username" name="textUsername">
        </label>
        <br><br>
        <label>
            Password:
            <input type="password" id="password_user_password" name="passwordUserPassword">
        </label>
        <br><br>
        <button type="submit">Submit</button>
		<br><br>
        <p id="p_login_hint" class="hint" style="display:none;">
            Username and password must be 8-16 characters and include: <br>
            - At least one lowercase letter<br>
            - At least one uppercase letter<br>
            - At least one digit<br>
            - At least one special character (!@#$%^&*?_.)
        </p>
    </form>
    <a href="PasswordReset.html">Forgot Password?</a>
</div>

<footer> <!-- Ok the one problem that the page has (besides the login needing to function or whatever) is that the footer
			  does not stick to the bottom of the screen/window. Just FYI. -->

    <br> 											   <!-- Unless it has to be one of ours?? -->
    &copy; UAFFILMS
</footer>

<!-- Link to the js file. -->
<script src="Login.js"></script>

</body>
</html>
