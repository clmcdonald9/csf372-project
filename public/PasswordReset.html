<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- This is not really part of the instructions but it just makes things look nicer. -->
    <title>UAF Films - Login</title>
    <style>
        body { 
			font-family: Arial, sans-serif; 
			margin: 0;
			display: flex;
			flex-direction: column;
			min-height: 100vh; 
		}
		
        header, footer { 
			background-color: #12279c; 
			color: yellow; 
			padding: 15px; 
		}

        header img { height: 50px;
			vertical-align: middle; 
		}

        nav a {
            color: white;
            margin: 0 15px;
            font-weight: bold;
       	}

        .content { 
			padding: 40px; 
			text-align: center; 
			flex: 1;
		}

        p { 
			font-size: 12pt; 
			text-align: justify; 
			max-width: 800px; 
			margin: auto; 
		}

        footer { 
			text-align: center; 
		}

		 .thumbnail { /* This is a test to try and get all of my images to be a more regular size. */
        width: 200px;
        height: 200px;
        object-fit: cover;
    	}
    </style>
</head>
<body>

<header>
    <img src="../logo.png" title="UAF Logo"> <!-- This will fail because I did not upload the pictures it references to the github. -->
    <span style="font-size: 28px; font-weight: bold;"> UAF Films</span>
</header>

<div class="content">
    <h2>Password Reset</h2>

    <form id="form_username"> 
        <label>
            Username:
            <input type="text" id="text_username" name="textUsername">
        </label>
        <button type="submit">Next</button>
		<br><br>
        
    </form>

    <form id = "form_new_password" style="display:none;"> <!-- This form is hidden until the user submits their username. -->
        <br><br>
        <label id="label_security_question_1">
            question 1
        </label>
            <input type="text" id="text_answer_1" name="textAnswer1">
        <br><br>
        <label id="label_security_question_2">
            question 2
        </label>
            <input type="text" id="text_answer_2" name="textAnswer2">
        <br><br>
        <br><br>
        <label>
            New Password:
        </label>
            <input type="password" id="password_new_password" name="passwordNewPassword">
        <br><br>
        <p id="p_password_hints" class="hint">
            Password must be 8-16 characters and include: <br>
            - At least one lowercase letter<br>
            - At least one uppercase letter<br>
            - At least one digit<br>
            - At least one special character (!@#$%^&*?_.)
        </p>
        <br><br>
        <button type="submit">Update Password</button>
    </form>
    <a href="Login.html">Back to Login</a>
</div>

<footer> 
    Contact: qtherrell@alaska.edu | +1-800-MOVIES!!!!
    <br> 											   
    &copy; UAFFILMS
</footer>

<!-- Link to the js file. -->
<script src="PasswordReset.js"></script>

</body>
</html>
