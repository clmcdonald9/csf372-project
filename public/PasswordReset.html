<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- This is not really part of the instructions but it just makes things look nicer. -->
    <title>UAF Films - Login</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; }
        header, footer { background-color: #12279c; color: yellow; padding: 15px; }
        header img { height: 50px; vertical-align: middle; }
        nav a {
            color: white;
            margin: 0 15px;
            font-weight: bold;
        }
        .content { padding: 40px; text-align: center; }
        p { font-size: 12pt; text-align: justify; color: blue; max-width: 800px; margin: auto; }
        footer { text-align: center; }
        .error { color: red; text-align: center; }
    </style>
</head>
<body>

<header>
    <img src="Pictures/logo.png" title="UAF Logo"> <!-- This will fail because I did not upload the pictures it references to the github. -->
    <span style="font-size: 28px; font-weight: bold;"> UAF Films</span>
</header>

<div class="content">
    <h2>Password Reset</h2>

    <form id="form_username"> 
        <label>
            Username:
            <input type="text" id="text_username" name="textUsername">
        </label>
        <button type="submit">Next</button>
		<br><br>
        
    </form>

    <form id = "form_new_password" style="display:none;"> <!-- This form is hidden until the user submits their username. -->
        <br><br>
        <label id="label_question_1">
            question 1
            <br>
            <input type="text" id="text_answer_1" name="textAnswer1">
        </label>
        <br><br>
        <label id="label_question_2">
            question 2
            <br>
            <input type="text" id="text_answer_2" name="textAnswer2
        </label>
        <br><br>
        <label>
            New Password:
            <input type="password" id="password_new_password" name="passwordNewPassword">
        </label>
        <br><br>
        <button type="submit">Update Password</button>
        <br><br>
        <p id="p_password_hints" class="error">
            Password must be 8-16 characters and include: <br>
            - At least one lowercase letter<br>
            - At least one uppercase letter<br>
            - At least one digit<br>
            - At least one special character (!@#$%^&*?_.)
        </p>
    </form>
    <a href="Login.html">Back to Login</a>
</div>

<footer> 
    Contact: qtherrell@alaska.edu | +1-800-MOVIES!!!!
    <br> 											   
    &copy; UAFFILMS
</footer>

<!-- Link to the js file. -->
<script src="PasswordReset.js"></script>

</body>
</html>
